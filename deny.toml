# Deny configuration for cargo-deny
# See https://github.com/EmbarkStudios/cargo-deny/blob/main/docs/

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "CC0-1.0",
]

[bans]
deny = [
    { name = "rust-serialization", version = "<=0.4.4" },
]

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # Add advisory IDs to ignore here
    # Example: "RUSTSEC-0000-0000"
]
