name: Coverage

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate text coverage report
        run: cargo llvm-cov --text | tee coverage.txt

      - name: Check coverage thresholds
        run: |
          # Extract the last percentage value from the TOTAL line (Lines Cover %)
          # This is robust against column count changes in cargo-llvm-cov output
          COVERAGE=$(grep "^TOTAL" coverage.txt | grep -oE '[0-9]+\.[0-9]+%' | tail -1 | tr -d '%')
          
          if [ -z "$COVERAGE" ]; then
            echo "Error: Could not extract coverage from report"
            echo "Coverage file content (last 10 lines):"
            tail -10 coverage.txt
            exit 1
          fi
          
          echo "Current coverage: $COVERAGE%"
          
          # Set minimum coverage threshold (adjust as needed)
          MIN_COVERAGE=30
          
          if [ "$(echo "$COVERAGE < $MIN_COVERAGE" | bc -l)" = "1" ]; then
            echo "Coverage ($COVERAGE%) is below minimum threshold ($MIN_COVERAGE%)"
            exit 1
          fi
          
          echo "Coverage check passed!"
        shell: bash

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.txt
          retention-days: 30
