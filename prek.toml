[[repos]]
repo = "local"
hooks = [
  {
    id = "fmt",
    name = "cargo fmt",
    language = "system",
    entry = "cargo fmt -- --check",
    files = "\\.rs$",
    pass_filenames = false,
  },
  {
    id = "clippy",
    name = "cargo clippy",
    language = "system",
    entry = "cargo clippy --all-targets -- -D warnings",
    files = "\\.rs$",
    pass_filenames = false,
  },
]
